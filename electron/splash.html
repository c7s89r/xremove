<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 90% at 50% 0%, #15151e, #0c0c13 70%);
    color: #f5f5f8; font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; -webkit-user-select: none; user-select: none;
    border: 1px solid rgba(255,255,255,.08); border-radius: 14px; overflow: hidden;
  }
  .mark {
    width: 78px; height: 78px; border-radius: 20px;
    box-shadow: 0 16px 40px rgba(0,0,0,.55);
  }
  .name { font-size: 26px; font-weight: 850; letter-spacing: -.6px; margin-top: -4px; }
  .by { font-size: 12px; color: #9aa3c0; font-weight: 600; margin-top: -10px; letter-spacing: .3px; }
  .by b { color: #e7eaf5; font-weight: 750; }
  .stage { font-size: 13px; font-weight: 600; color: #d6d6db; margin-top: 2px; }
  .detail { font-size: 11.5px; color: #8b8b96; min-height: 14px; text-align: center; padding: 0 20px; }
  .bar { width: 230px; height: 4px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
  .bar i {
    display: block; height: 100%; width: 40%; border-radius: 999px;
    background: linear-gradient(90deg, transparent, #fff, transparent);
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
</style>
</head>
<body>
  <img class="mark" src="../build/icon.png" alt="">
  <div class="name">xremove</div>
  <div class="by">by <b>salad fingers</b> · @c7s89r</div>
  <div class="stage" id="stage">Starting engine…</div>
  <div class="detail" id="detail"></div>
  <div class="bar"><i></i></div>
  <script>
    window.setStatus = (stage, detail) => {
      document.getElementById("stage").textContent = stage;
      document.getElementById("detail").textContent = detail || "";
    };
  </script>
</body>
</html>
